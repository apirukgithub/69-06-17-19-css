<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h1 class="display-1 ml-3">ลงทะเบียน</h1>

        <div class="row">
            <div class="col-12 col-md-4 col-lg-3 bg-primary text-white">
                <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label">ชื่อ-นามสกุล</label>
                <input type="text" class="form-control" id="exampleFormControlInput1" placeholder="กรอกชื่อ-นามสกุล">
                </div>

                <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">ที่อยู่</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">เพศ</label>
                    <div class="form-check">               
                        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                        <label class="form-check-label" for="radioDefault1">
                            ชาย
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
                        <label class="form-check-label" for="radioDefault2">
                            หญิง
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault3" checked>
                        <label class="form-check-label" for="radioDefault3">
                            ไม่ระบุ
                        </label>
                    </div>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                    <label for="floatingInput">Email address</label>
                    </div>
                </div>

                <div class="mb-3">
                    <button type="button" class="btn btn-warning">บันทึก</button>
                </div>

            </div>
        </div>
    </div>

        



    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoC54BvY7E2jv9S8V0X5M7L6g9X5Y7s8Z0W0C2s0T1y3Z4A" crossorigin="anonymous"></script>
</body>
</html>
